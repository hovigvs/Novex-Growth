<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1F4E"/>
      <stop offset="40%" style="stop-color:#2D3480"/>
      <stop offset="70%" style="stop-color:#3B2D7A"/>
      <stop offset="100%" style="stop-color:#1E3470"/>
    </linearGradient>
    <linearGradient id="logo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5CE0FF"/>
      <stop offset="55%" style="stop-color:#6B75D9"/>
      <stop offset="100%" style="stop-color:#4A52C4"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#5CE0FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#5CE0FF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#6B75D9;stop-opacity:0.20"/>
      <stop offset="100%" style="stop-color:#6B75D9;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Orbs -->
  <ellipse cx="1050" cy="150" rx="350" ry="350" fill="url(#orb1)"/>
  <ellipse cx="150" cy="500" rx="280" ry="280" fill="url(#orb2)"/>

  <!-- Logo wordmark -->
  <text x="600" y="240" text-anchor="middle" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-weight="700" font-size="96" fill="url(#logo)">novexgrowth</text>

  <!-- Tagline -->
  <text x="600" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="32" fill="rgba(255,255,255,0.70)">AI Growth Systems for Service Businesses</text>

  <!-- Divider -->
  <rect x="460" y="355" width="280" height="2" rx="1" fill="rgba(255,255,255,0.15)"/>

  <!-- Sub tagline -->
  <text x="600" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.50)">novexgrowth.com</text>
</svg>
