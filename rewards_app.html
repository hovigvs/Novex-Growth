function redeemTab(){
  var pts=S.pts,cat=S.cat;
  var filtered=cat==='All'?CAT:CAT.filter(function(c){return c.cat===cat;});

    return '<button data-a="set-cat" data-val="'+c+'" style="padding:5px 12px;border-radius:20px;flex-shrink:0;background:'+(cat===c?R:'transparent')+';color:'+(cat===c?'white':'#888')+';border:'+(cat===c?'none':'0.5px solid #DDD')+';font-size:11.5px;font-weight:600;cursor:pointer">'+c+'</button>';
  }).join('');
  var iHTML=filtered.map(function(item){
    var ok=pts>=item.pts;

      +'<div style="width:38px;height:38px;border-radius:10px;background:'+R+'18;display:flex;align-items:center;justify-content:center;margin-bottom:9px"><i class="ti ti-gift" style="font-size:19px;color:'+R+'"></i></div>'

      +'<div style="font-size:11.5px;font-weight:600;color:#1A1A1A;line-height:1.35;margin-bottom:5px">'+item.name+'</div>'
      +'<div style="font-size:13.5px;font-weight:800;color:'+R+';margin-bottom:9px">'+item.pts.toLocaleString()+' pts</div>'
      +'<button data-a="'+(ok?'confirm-redeem':'noop')+'" data-id="'+item.id+'" style="width:100%;padding:8px 0;border-radius:8px;background:'+(ok?R:'#EEE')+';color:'+(ok?'white':'#BBB')+';border:none;font-size:11.5px;font-weight:600;cursor:'+(ok?'pointer':'default')+'">'+(ok?'Redeem':'Need more pts')+'</button>'
      +'</div>';

    +'<div style="display:flex;justify-content:space-between;align-items:flex-start">'
    +'<div><div style="font-size:18px;font-weight:700">Redeem</div><div style="font-size:12.5px;opacity:.65;margin-top:1px">National Catalogue</div></div>'
    +'<div style="background:rgba(255,255,255,0.12);border-radius:10px;padding:7px 12px;text-align:right"><div style="font-size:9.5px;opacity:.6;text-transform:uppercase;letter-spacing:1px">Balance</div><div style="font-size:18px;font-weight:800">'+pts.toLocaleString()+'</div><div style="font-size:9.5px;opacity:.55">points</div></div>'
    +'</div></div>'
    +'<div style="padding:10px 18px 6px;background:white;border-bottom:0.5px solid #EAE0D6;display:flex;gap:7px;overflow-x:auto">'+fHTML+'</div>'
    +'<div style="padding:14px;display:grid;grid-template-columns:1fr 1fr;gap:11px">'+iHTML+'</div></div>';

function historyTab(){
  var pts=S.pts,f=S.histFilter;
  var shown=f==='all'?TXN:f==='earned'?TXN.filter(function(t){return t.earn;}):TXN.filter(function(t){return !t.earn;});
  var te=TXN.filter(function(t){return t.earn;}).reduce(function(s,t){return s+t.pts;},0);
  var tr=TXN.filter(function(t){return !t.earn;}).reduce(function(s,t){return s+t.pts;},0);
  var stats=[{l:'Balance',v:pts.toLocaleString(),c:R},{l:'Earned',v:te.toLocaleString(),c:'#2A7A50'},{l:'Redeemed',v:tr.toLocaleString(),c:G}];
  var sHTML=stats.map(function(s){return '<div style="background:white;border-radius:11px;padding:11px 9px;border:0.5px solid #EAE0D6;text-align:center"><div style="font-size:9.5px;color:#BBB;margin-bottom:3px">'+s.l+'</div><div style="font-size:17px;font-weight:800;color:'+s.c+'">'+s.v+'</div></div>';}).join('');
  var fHTML=['all','earned','redeemed'].map(function(x){return '<button data-a="hist-filter" data-val="'+x+'" style="padding:5px 13px;border-radius:20px;background:'+(f===x?R:'white')+';color:'+(f===x?'white':'#888')+';border:'+(f===x?'none':'0.5px solid #DDD')+';font-size:11.5px;font-weight:600;cursor:pointer;text-transform:capitalize">'+x+'</button>';}).join('');
  var rHTML=shown.map(function(t,i){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 13px;border-bottom:'+(i<shown.length-1?'0.5px solid #F0E8DF':'none')+'">'
      +'<div style="display:flex;align-items:center;gap:9px">'
      +'<div style="width:33px;height:33px;border-radius:8px;background:'+(t.earn?R+'18':'rgba(168,124,26,0.1)')+';display:flex;align-items:center;justify-content:center;flex-shrink:0">'
      +'<i class="ti '+(t.earn?'ti-arrow-narrow-up':'ti-arrow-narrow-down')+'" style="font-size:17px;color:'+(t.earn?R:G)+'"></i></div>'
      +'<div><div style="font-size:11.5px;font-weight:600;color:#1A1A1A">'+t.desc+'</div><div style="font-size:10px;color:#C0B8B0">'+t.date+', 2026</div></div></div>'
      +'<div style="font-size:12.5px;font-weight:800;color:'+(t.earn?'#2A7A50':'#AAA')+';flex-shrink:0">'+(t.earn?'+':'-')+t.pts+'</div></div>';
  }).join('');
  return '<div><div style="background:'+R+';padding:6px 20px 20px;color:white"><div style="font-size:18px;font-weight:700">Activity</div></div>'
    +'<div style="padding:13px 18px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px">'+sHTML+'</div>'
    +'<div style="padding:0 18px 10px;display:flex;gap:7px">'+fHTML+'</div>'
    +'<div style="padding:0 18px 22px"><div style="background:white;border-radius:13px;overflow:hidden;border:0.5px solid #EAE0D6">'+rHTML+'</div></div></div>';
}

  var sets=[{icon:'ti-bell',label:'Notifications',val:'On'},{icon:'ti-language',label:'Language',val:'English'},{icon:'ti-map-pin',label:'Home Store',val:'Scarborough'},{icon:'ti-help-circle',label:'Help & Support',val:''}];
  var setHTML=sets.map(function(item,i){
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:'+(i<sets.length-1?'0.5px solid #F0E8DF':'none')+'">'
      +'<div style="display:flex;align-items:center;gap:9px"><i class="ti '+item.icon+'" style="font-size:16px;color:#CCC"></i><span style="font-size:12.5px;font-weight:500;color:#1A1A1A">'+item.label+'</span></div>'
      +'<div style="display:flex;align-items:center;gap:5px">'+(item.val?'<span style="font-size:11.5px;color:#CCC">'+item.val+'</span>':'')+'<i class="ti ti-chevron-right" style="font-size:13px;color:#DDD"></i></div></div>';
  }).join('');
  return '<div><div style="background:'+R+';padding:6px 20px 20px;color:white"><div style="font-size:18px;font-weight:700">My Profile</div></div>'
    +'<div style="padding:16px 18px 24px">'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">'
    +'<div style="width:50px;height:50px;border-radius:25px;background:'+R+'25;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:18px;font-weight:700;color:'+R+'">SH</span></div>'
    +'<div><div style="font-size:15.5px;font-weight:700;color:#1A1A1A">Sarah Haddad</div><div style="font-size:11.5px;color:#BBB">Member since March 2023</div></div></div>'
    +'<div style="background:'+R+';border-radius:18px;padding:15px 17px;color:white;margin-bottom:11px">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">'
    +'<div style="background:white;border-radius:8px;padding:4px 10px"><img src="'+LI+'" style="height:26px;display:block" alt="Novex Growth"/></div>'
    +'<div style="background:rgba(255,255,255,0.12);border-radius:7px;padding:3px 9px;font-size:11px;font-weight:700;color:'+GA+'"><i class="ti ti-star" style="margin-right:2px;font-size:9px"></i>GOLD</div></div>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-end">'
    +'<div><div style="font-size:10px;opacity:.45;letter-spacing:1px;margin-bottom:2px">MEMBER</div>'
    +'<div style="font-size:13px;font-weight:600">Sarah Haddad</div>'
    +'<div style="font-size:11px;opacity:.5;margin-top:2px;letter-spacing:2px">Novex Growth &middot; 0002 &middot; 4501</div>'
    +'<div style="margin-top:9px;display:flex;align-items:baseline;gap:5px"><span style="font-size:19px;font-weight:800">'+pts.toLocaleString()+'</span><span style="font-size:10px;opacity:.6">points</span></div></div>'
    +'<div style="background:white;border-radius:8px;padding:5px">'+qr(74)+'</div></div></div>'
    +'<button data-a="show-scan" style="width:100%;padding:14px;border-radius:13px;background:#1A1A1A;color:white;border:none;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:12px"><i class="ti ti-qrcode" style="font-size:19px"></i>Scan at Checkout</button>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
    +'<div style="background:white;border-radius:11px;padding:12px;border:0.5px solid #EAE0D6"><div style="font-size:10px;color:#BBB;margin-bottom:3px">Points Balance</div><div style="font-size:15px;font-weight:800;color:'+R+'">'+pts.toLocaleString()+' pts</div></div>'
    +'<div style="background:white;border-radius:11px;padding:12px;border:0.5px solid #EAE0D6"><div style="font-size:10px;color:#BBB;margin-bottom:3px">Total Visits</div><div style="font-size:15px;font-weight:800;color:#2A7A50">28 orders</div></div></div>'
    +'<div style="background:white;border-radius:13px;overflow:hidden;border:0.5px solid #EAE0D6">'+setHTML+'</div>'
    +'<button style="width:100%;margin-top:12px;padding:12px;border-radius:12px;border:0.5px solid #E8D8D8;background:white;color:#C84444;font-size:13px;font-weight:600;cursor:pointer">Sign Out</button>'
    +'<div style="height:20px"></div></div></div>';
}

function bottomNav(){
  var tabs=[{id:'home',icon:'ti-home',label:'Home'},{id:'earn',icon:'ti-star',label:'Earn'},{id:'redeem',icon:'ti-gift',label:'Redeem'},{id:'history',icon:'ti-clock',label:'Activity'},{id:'profile',icon:'ti-user',label:'Profile'}];
  return '<div style="display:flex;background:white;border-top:0.5px solid #EAE0D6;padding-bottom:10px;flex-shrink:0">'
    +tabs.map(function(t){return '<button data-a="tab" data-val="'+t.id+'" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:7px 0 3px;color:'+(S.tab===t.id?R:'#C8C0B8')+'"><i class="ti '+t.icon+'" style="font-size:20px"></i><span style="font-size:9px;font-weight:'+(S.tab===t.id?700:500)+'">'+t.label+'</span></button>';}).join('')
    +'</div>';
}

function notifsPanel(){
  return '<div style="position:absolute;inset:0;background:rgba(0,0,0,0.45);z-index:30;display:flex;flex-direction:column;justify-content:flex-start">'
    +'<div style="background:white;border-radius:0 0 22px 22px;padding:14px 18px 20px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div style="font-size:16px;font-weight:700;color:#1A1A1A">Notifications</div>'
    +'<button data-a="hide-notifs" style="background:none;border:none;cursor:pointer;font-size:20px;color:#AAA;padding:0"><i class="ti ti-x"></i></button></div>'
    +NOTIFS.map(function(n,i){
      return '<div style="display:flex;gap:11px;padding:11px 0;border-bottom:'+(i<NOTIFS.length-1?'0.5px solid #F0E8DF':'none')+'">'
        +'<div style="width:36px;height:36px;border-radius:10px;background:'+n.c+'25;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti '+n.icon+'" style="font-size:17px;color:'+n.c+'"></i></div>'
        +'<div style="flex:1"><div style="font-size:12.5px;font-weight:600;color:#1A1A1A">'+n.title+'</div><div style="font-size:11px;color:#AAA;margin-top:1px">'+n.body+'</div></div>'
        +'<div style="font-size:10px;color:#CCC;flex-shrink:0;padding-top:1px">'+n.time+'</div></div>';
    }).join('')
    +'</div></div>';
}

function scanModal(){
  return '<div style="position:absolute;inset:0;background:white;z-index:40;display:flex;flex-direction:column">'
    +'<div style="display:flex;justify-content:space-between;padding:11px 22px 4px;font-size:13px;font-weight:600;color:#1A1A1A;flex-shrink:0"><span>9:41</span><div style="display:flex;gap:5px;align-items:center"><i class="ti ti-wifi" style="font-size:14px"></i><i class="ti ti-battery-3" style="font-size:14px"></i></div></div>'
    +'<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px">'
    +'<img src="'+LI+'" style="height:38px;margin-bottom:20px" alt="Novex Growth"/>'
    +'<div style="font-size:21px;font-weight:700;color:#1A1A1A;margin-bottom:4px">Scan at Checkout</div>'
    +'<div style="font-size:13px;color:#BBB;margin-bottom:22px">Show this screen to your cashier</div>'
    +'<div style="background:white;border-radius:18px;padding:16px;border:1.5px solid #E8E0D6;margin-bottom:20px">'+qr(190)+'</div>'
    +'<div style="font-size:17px;font-weight:700;color:#1A1A1A;margin-bottom:3px">Sarah Haddad</div>'
    +'<div style="font-size:12px;color:#BBB;letter-spacing:2.5px;margin-bottom:14px">Novex Growth &middot; 0002 &middot; 4501</div>'
    +'<div style="background:'+R+'12;border-radius:12px;padding:10px 20px;display:flex;gap:8px;align-items:center;border:1px solid '+R+'20">'
    +'<i class="ti ti-star" style="font-size:14px;color:'+GA+'"></i>'
    +'<span style="font-size:14px;font-weight:700;color:'+R+'">'+S.pts.toLocaleString()+' pts</span>'
    +'<span style="font-size:12px;color:#AAA">&middot; Gold Member</span></div></div>'
    +'<div style="padding:0 24px 28px"><button data-a="hide-scan" style="width:100%;padding:15px;border-radius:14px;background:#1A1A1A;color:white;border:none;font-size:15px;font-weight:600;cursor:pointer">Done</button></div></div>';
}

function confirmModal(){
  var item=S.confirming;
  return '<div style="position:absolute;inset:0;background:rgba(0,0,0,0.52);display:flex;align-items:flex-end;z-index:20">'
    +'<div style="background:white;border-radius:22px 22px 0 0;padding:20px 22px 28px;width:100%">'
    +'<div data-a="cancel-redeem" style="width:32px;height:4px;background:#E0D8D0;border-radius:2px;margin:0 auto 16px;cursor:pointer"></div>'
    +'<div style="font-size:16.5px;font-weight:700;margin-bottom:4px">Confirm Redemption</div>'
    +'<div style="font-size:13.5px;color:#AAA;margin-bottom:3px">'+item.name+'</div>'
    +'<div style="font-size:26px;font-weight:800;color:'+R+';margin-bottom:5px">'+item.pts.toLocaleString()+' points</div>'
    +'<div style="font-size:12px;color:#C0B8B0;margin-bottom:18px">Balance after: '+(S.pts-item.pts).toLocaleString()+' pts</div>'
    +'<div style="display:flex;gap:11px">'
    +'<button data-a="cancel-redeem" style="flex:1;padding:13px;border-radius:12px;border:1px solid #E0D8D0;background:white;font-size:14px;font-weight:600;cursor:pointer;color:#888">Cancel</button>'
    +'<button data-a="do-redeem" style="flex:1;padding:13px;border-radius:12px;border:none;background:'+R+';color:white;font-size:14px;font-weight:700;cursor:pointer">Confirm</button>'
    +'</div></div></div>';
}

function toastEl(){
  if(!S.toast)return '';
  return '<div style="position:absolute;bottom:82px;left:14px;right:14px;background:rgba(18,18,18,0.93);color:white;border-radius:12px;padding:12px 16px;font-size:13px;font-weight:500;text-align:center;z-index:50"><i class="ti ti-circle-check" style="margin-right:6px;color:#4ADE80;font-size:15px"></i>'+S.toast+'</div>';
}

function showToast(msg){
  S.toast=msg;
  if(S.toastT)clearTimeout(S.toastT);
  S.toastT=setTimeout(function(){S.toast=null;render();},3000);
}

function render(){
  var dark=S.screen==='splash';
  var inner=sb(dark);
  if(S.screen==='splash') inner+=splash();
  else if(S.screen==='onboard') inner+=onboard();
  else if(S.screen==='login') inner+=loginScreen();
  else if(S.screen==='otp') inner+=otpScreen();
  else if(S.screen==='main'){
    inner+='<div id="tc" style="flex:1;overflow-y:auto;background:'+BG+'">';
    if(S.tab==='home') inner+=homeTab();
    else if(S.tab==='earn') inner+=earnTab();
    else if(S.tab==='redeem') inner+=redeemTab();
    else if(S.tab==='history') inner+=historyTab();
    else if(S.tab==='profile') inner+=profileTab();
    inner+='</div>'+bottomNav();
  }
  inner+=toastEl();
  if(S.notifs) inner+=notifsPanel();
  if(S.confirming) inner+=confirmModal();
  if(S.scan) inner+=scanModal();
  document.getElementById('app').innerHTML='<div style="background:'+(dark?R:CR)+';height:100%;display:flex;flex-direction:column;position:relative;font-family:Poppins,sans-serif">'+inner+'</div>';
}

document.addEventListener('click',function(e){
  var t=e.target.closest('[data-a]');
  if(!t)return;
  var a=t.getAttribute('data-a'),v=t.getAttribute('data-val'),id=t.getAttribute('data-id');
  if(a==='start'){S.screen='onboard';}
  else if(a==='next-slide'){if(S.slide<SLIDES.length-1){S.slide++;}else{S.screen='login';S.slide=0;}}
  else if(a==='skip'){S.screen='login';S.slide=0;}
  else if(a==='send-code'){var ph=document.getElementById('ph');S.phone=ph?ph.value||'+1 (647) 555-0192':'+1 (647) 555-0192';S.screen='otp';}
  else if(a==='verify'){S.screen='main';}
  else if(a==='tab'){S.tab=v;}
  else if(a==='set-cat'){S.cat=v;}
  else if(a==='hist-filter'){S.histFilter=v;}
  else if(a==='show-notifs'){S.notifs=true;}
  else if(a==='hide-notifs'){S.notifs=false;}
  else if(a==='show-scan'){S.scan=true;}
  else if(a==='hide-scan'){S.scan=false;}
  else if(a==='whatsapp'){showToast('Opening WhatsApp with Layla...');return;}
  else if(a==='confirm-redeem'){var found=CAT.find(function(c){return c.id===parseInt(id);});if(found)S.confirming=found;}
  else if(a==='cancel-redeem'){S.confirming=null;}
  else if(a==='do-redeem'){if(S.confirming){S.pts-=S.confirming.pts;S.confirming=null;showToast('Redeemed! Check your email for your reward.');}return;}
  else if(a==='noop'){return;}
  render();
});

document.addEventListener('input',function(e){
  if(e.target.id==='ph'){S.phone=e.target.value;}
  else if(e.target.id==='ot'){
    S.otp=e.target.value;
    var btn=document.querySelector('[data-a="verify"]');
    if(btn)btn.style.background=S.otp.length>=4?R:'#E0D8D0';
  }
});

render();
</script>
</body>
</html>
